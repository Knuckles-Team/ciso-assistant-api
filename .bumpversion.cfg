[bumpversion]
current_version = 1.0.0
commit = True
tag = True

[bumpversion:file:pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:a2a.json]
search = "version": "{current_version}"
replace = "version": "{new_version}"

[bumpversion:file:README.md]
search = Version: {current_version}
replace = Version: {new_version}

[bumpversion:file(mcp-img):docker/Dockerfile]
search = ciso-assistant-api[mcp]>={current_version}
replace = ciso-assistant-api[mcp]>={new_version}

[bumpversion:file(agent-img):docker/Dockerfile]
search = ciso-assistant-api[agent]>={current_version}
replace = ciso-assistant-api[agent]>={new_version}

[bumpversion:file:ciso_assistant_api/agent_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:ciso_assistant_api/mcp_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"
