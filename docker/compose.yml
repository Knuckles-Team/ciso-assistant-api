---
services:
  ciso-assistant-agent:
    build:
      context: ..
      dockerfile: docker/debug.Dockerfile
    command: [ "ciso-assistant-agent" ]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    env_file:
      - .env
    environment:
      - "HOST=0.0.0.0"
      - "PORT=9001"
      - "TRANSPORT=stdio"
      - "CISO_ASSISTANT_URL=${CISO_ASSISTANT_URL}"
      - "CISO_ASSISTANT_TOKEN_REF=${CISO_ASSISTANT_TOKEN_REF}"
      - "CISO_ASSISTANT_TLS_PROFILE_REF=${CISO_ASSISTANT_TLS_PROFILE_REF:-}"
      - "PROVIDER=${PROVIDER}"
      - "LLM_BASE_URL=${LLM_BASE_URL}"
      - "MODEL_ID=${MODEL_ID}"
      - "DEBUG=False"
      - "ENABLE_WEB_UI=True"
      - "ENABLE_OTEL=True"
    ports:
      - "${CISO_ASSISTANT_BIND_ADDRESS:-127.0.0.1}:9001:9001"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9001/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
