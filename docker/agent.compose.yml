services:
  ciso-assistant-api-mcp:
    image: ${CISO_ASSISTANT_MCP_IMAGE:?set-CISO_ASSISTANT_MCP_IMAGE-to-image@sha256-digest}
    restart: always
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
      - HOST=0.0.0.0
      - PORT=8000
      - TRANSPORT=streamable-http
    ports:
      - "${CISO_ASSISTANT_BIND_ADDRESS:-127.0.0.1}:8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ciso-assistant-api-agent:
    image: ${CISO_ASSISTANT_AGENT_IMAGE:?set-CISO_ASSISTANT_AGENT_IMAGE-to-image@sha256-digest}
    restart: always
    depends_on:
      - ciso-assistant-api-mcp
    env_file:
      - ../.env
    command: [ "ciso-assistant-agent" ]
    environment:
      - PYTHONUNBUFFERED=1
      - HOST=0.0.0.0
      - PORT=9018
      - MCP_URL=http://ciso-assistant-api-mcp:8000/mcp
      - PROVIDER=${PROVIDER:-openai}
      - MODEL_ID=${MODEL_ID:-gpt-4o}
      - ENABLE_WEB_UI=True
      - ENABLE_OTEL=True
    ports:
      - "${CISO_ASSISTANT_BIND_ADDRESS:-127.0.0.1}:9018:9018"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9018/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
